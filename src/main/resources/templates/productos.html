<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión MarlenyFarma</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>
    <div class="main-container">
        <header class="app-header">
            <h1><i class="fa-solid fa-microscope"></i> BOTICA MARLENYFARMA</h1>
            <div style="color: white; opacity: 0.6;">CAJAMARCA</div>
        </header>

        <div class="dashboard">
            <div class="card">
                <div class="card-title">
                    <i class="fa-solid fa-circle-plus"></i> NUEVO REGISTRO
                </div>
                <form th:action="@{/guardar}" th:object="${producto}" method="post">
                    <div class="form-group">
                        <label>MEDICAMENTO</label>
                        <input type="text" th:field="*{nombre}" placeholder="Nombre del producto..." required>
                    </div>
                    <div class="form-group">
                        <label>PRECIO UNITARIO (S/)</label>
                        <input type="number" step="0.01" th:field="*{precio}" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>STOCK ALMACÉN</label>
                        <input type="number" th:field="*{stock}" placeholder="Cantidad..." required>
                    </div>
                    <button type="submit">
                        <i class="fa-solid fa-cloud-arrow-up"></i> GUARDAR EN SISTEMA
                    </button>
                </form>
            </div>

            <div class="card">
                <table>
                    <thead>
                        <tr>
                            <th>CÓDIGO</th>
                            <th>DESCRIPCIÓN DEL PRODUCTO</th>
                            <th>PRECIO</th>
                            <th>STOCK ACTUAL</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-productos-body">
                        <tr th:each="p : ${listaProductos}">
                            <td th:text="${p.id}" style="color: #94a3b8;"></td>
                            <td th:text="${p.nombre}" style="font-weight: 600;"></td>
                            <td class="price-tag" th:text="'S/ ' + ${p.precio}"></td>
                            <td>
                                <div class="stock-container">
                                    <div class="stock-badge">
                                        <i class="fa-solid fa-cubes"></i>
                                        <span th:text="${p.stock}"></span>
                                    </div>
                                </div>
                            </td>

                           <td style="text-align: center;">
                                <a th:href="@{/eliminar/{id}(id=${p.id})}" 
                                   style="color: #ef4444; font-size: 1.2rem;"
                                   onclick="return confirm('¿Desea eliminar este producto?')">
                                    <i class="fa-solid fa-trash-can"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div> 
        </div> 
    </div> 


    <script>
    async function cargarProductos() {
        try {
            const response = await fetch('http://localhost:8081/api/productos');
            const productos = await response.json();
            const tbody = document.getElementById('tabla-productos-body');
            tbody.innerHTML = ''; 

            productos.forEach(p => {
                const fila = `
                    <tr>
                        <td style="color: #94a3b8;">${p.id}</td>
                        <td style="font-weight: 600;">${p.nombre.toUpperCase()}</td>
                        <td class="price-tag">S/ ${p.precio.toFixed(2)}</td>
                        <td>
                            <div class="stock-container">
                                <div class="stock-badge">
                                    <i class="fa-solid fa-cubes"></i>
                                    <span>${p.stock}</span>
                                </div>
                            </div>
                        </td>
                        <td style="text-align: center;">
                            <a href="#" onclick="eliminarProducto(${p.id})" style="color: #ef4444; font-size: 1.2rem;">
                                <i class="fa-solid fa-trash-can"></i>
                            </a>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += fila;
            });
        } catch (error) {
            console.error("Error en la botica:", error);
        }
    }

    
    function eliminarProducto(id) {
    if(confirm('¿Desea eliminar este producto?')) {
        fetch(`http://localhost:8081/api/productos/${id}`, {
            method: 'DELETE'
        })
        .then(() => {
            cargarProductos();
        })
        .catch(error => {
            console.error("Error al eliminar:", error);
        });
    }

    document.addEventListener('DOMContentLoaded', cargarProductos);
</script>


</body>
</html>
